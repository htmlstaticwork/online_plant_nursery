<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="light">

<head>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Join the Vault | Verdant Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Theme Script (Inline to prevent flicker) -->
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        secondary: 'var(--secondary)',
                        accentGreen: 'var(--accent-green)',
                        accentGold: 'var(--accent-gold)',
                        card: 'var(--card-bg)',
                        border: 'var(--border-color)',
                        surface: 'var(--bg-main)',
                        darkBg: '#000000'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body
    class="bg-theme-main min-h-screen flex items-start sm:items-center justify-center py-8 sm:py-12 px-6 relative transition-colors duration-500">

    <!-- Background Image with Theme Overlay -->
    <div class="fixed inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1596547609652-9cf5d8d76921?w=1600&q=80" alt=""
            class="w-full h-full object-cover grayscale opacity-20 transition-all duration-1000">
        <div class="absolute inset-0 transition-colors duration-500" style="background-color: var(--overlay-bg)"></div>
    </div>

    <!-- Floating Controls (Desktop/Tablet/Mobile) -->
    <div class="floating-controls flex absolute top-6 right-6 z-[1100] items-center flex-nowrap gap-4">
        <button id="theme-toggle"
            class="w-12 h-12 flex items-center justify-center rounded-full bg-theme-card border border-theme text-theme-main hover:scale-110 transition-all shadow-lg backdrop-blur-md"
            title="Toggle Theme">
            <i class="fas fa-moon text-base"></i>
        </button>
        <button id="rtl-toggle"
            class="h-12 px-4 flex items-center justify-center text-[10px] font-bold border border-theme rounded-full bg-theme-card text-theme-main hover:bg-accentGreen hover:text-white transition-all uppercase shadow-md backdrop-blur-md leading-none"
            title="Switch Language Direction">RTL</button>
    </div>

    <!-- Login Card -->
    <div class="max-w-md w-full relative z-10 animate-plantGrow mt-4 sm:mt-0">
        <div
            class="bg-theme-card pt-16 pb-8 md:pt-12 md:pb-12 px-8 md:px-12 rounded-[2.5rem] border border-theme shadow-2xl backdrop-blur-md relative">

            <!-- Mobile Controls (Removed, moved to fixed position) -->

            <div class="text-center mb-10">
                <a href="index.html" class="brand-logo group justify-center mb-6">
                    <i class="fas fa-leaf"></i>
                    <span>Verdant Vault</span>
                </a>
                <h1 class="text-theme-main text-xl font-medium tracking-widest uppercase mb-2">Welcome Back</h1>
                <p class="text-theme-main opacity-80 text-sm italic font-playfair">Resuming your botanical journey</p>
            </div>

            <form class="space-y-6">
                <!-- Select Login/Signup -->
                <div class="flex gap-2 p-1 bg-theme-main rounded-full border border-theme mb-8">
                    <a href="login.html"
                        class="flex-1 py-3 bg-accentGreen text-white rounded-full font-bold text-sm text-center transition-all shadow-md btn-signup-main">Login</a>
                    <a href="signup.html"
                        class="flex-1 py-3 text-theme-main rounded-full font-bold text-sm text-center hover:bg-black/5 dark:hover:bg-white/5 transition-all">Signup</a>
                </div>

                <div class="space-y-4">
                    <div class="space-y-2 text-start">
                        <label for="collectorEmail"
                            class="text-[10px] font-bold text-theme-main opacity-70 uppercase tracking-widest ml-2">Email
                            Address</label>
                        <div class="relative group">
                            <i
                                class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-theme-main opacity-40 group-focus-within:text-accentGreen"></i>
                            <input type="email" id="collectorEmail" placeholder="Enter your Email"
                                class="w-full py-4 pl-14 pr-6 bg-theme-main border border-theme rounded-2xl text-theme-main outline-none focus:border-accentGreen transition-all placeholder:text-theme-main placeholder:opacity-50">
                        </div>
                    </div>

                    <div class="space-y-2 text-start">
                        <label for="password"
                            class="text-[10px] font-bold text-theme-main opacity-70 uppercase tracking-widest ml-2">Password</label>
                        <div class="relative group">
                            <i
                                class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-theme-main opacity-40 group-focus-within:text-accentGreen"></i>
                            <input type="password" id="password" placeholder="••••••••"
                                class="w-full py-4 pl-14 pr-6 bg-theme-main border border-theme rounded-2xl text-theme-main outline-none focus:border-accentGreen transition-all placeholder:text-theme-main placeholder:opacity-50">
                            <button type="button" onclick="togglePassword('password', this)"
                                class="absolute right-5 top-1/2 -translate-y-1/2 text-theme-main opacity-40 hover:opacity-100 transition-opacity">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div
                    class="flex flex-nowrap justify-between items-center text-[10px] md:text-xs text-theme-main opacity-60 px-2 font-bold uppercase tracking-widest gap-2 sm:gap-4">
                    <label class="flex items-center gap-2 cursor-pointer group shrink-0">
                        <input type="checkbox" class="accent-accentGreen w-4 h-4">
                        <span class="group-hover:text-accentGreen transition-all whitespace-nowrap">Remember Me</span>
                    </label>
                    <a href="#" class="hover:text-accentGreen transition-all whitespace-nowrap text-right">Forgot Password?</a>
                </div>

                <button type="submit"
                    class="w-full bg-accentGreen text-white py-4 rounded-2xl font-bold tracking-widest text-xs sm:text-sm hover:translate-y-[-2px] hover:scale-[1.02] hover:bg-primary transition-all shadow-lg shadow-accentGreen/20 uppercase btn-signup-main">
                    Enter the Greenhouse
                </button>

                <div class="relative flex items-center justify-center my-10">
                    <span
                        class="relative px-4 bg-theme-card text-theme-main opacity-60 text-[10px] uppercase tracking-widest font-bold">Or
                        Connect Via</span>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <button type="button"
                        class="flex items-center justify-center py-4 border border-theme rounded-xl text-theme-main hover:border-accentGreen hover:shadow-xl hover:bg-accentGreen/5 transition-all active:scale-95 group"
                        title="Continue with Google">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                            class="w-5 h-5 group-hover:scale-110 transition-transform" alt="Google">
                    </button>
                    <button type="button"
                        class="flex items-center justify-center py-4 border border-theme rounded-xl text-theme-main hover:bg-[#1877F2] hover:text-white hover:border-transparent hover:shadow-xl transition-all active:scale-95 group"
                        title="Continue with Facebook">
                        <i class="fab fa-facebook text-xl group-hover:scale-110 transition-all"></i>
                    </button>
                    <button type="button"
                        class="flex items-center justify-center py-4 border border-theme rounded-xl text-theme-main hover:bg-black hover:text-white hover:border-transparent hover:shadow-xl transition-all active:scale-95 group"
                        title="Continue with Apple">
                        <i class="fab fa-apple text-xl group-hover:scale-110 transition-all"></i>
                    </button>
                </div>
            </form>
        </div>


    </div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
