<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Join the Vault | Verdant Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Theme Script (Inline to prevent flicker) -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary)',
                        secondary: 'var(--secondary)',
                        accentGreen: 'var(--accent-green)',
                        accentGold: 'var(--accent-gold)',
                        card: 'var(--card-bg)',
                        border: 'var(--border-color)',
                        surface: 'var(--bg-main)'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-theme-main min-h-screen flex items-center justify-center p-6 relative overflow-hidden transition-colors duration-500">
    
    <!-- Background Image with Theme Overlay -->
    <div class="fixed inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1596547609652-9cf5d8d76921?w=1600&q=80" alt="" class="w-full h-full object-cover grayscale opacity-20 transition-all duration-1000">
        <div class="absolute inset-0 transition-colors duration-500" style="background-color: var(--overlay-bg)"></div>
    </div>

    <!-- Floating Controls -->
    <div class="fixed top-8 right-8 z-[1000] flex items-center gap-4">
        <button id="theme-toggle" class="p-3 rounded-full bg-theme-card border border-theme text-theme-main hover:scale-110 transition-all shadow-lg"
            title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
        <button id="rtl-toggle"
            class="p-3 rounded-full bg-theme-card border border-theme text-theme-main hover:scale-110 transition-all shadow-lg hidden md:block"
            title="Switch Language Direction">
            <i class="fas fa-language"></i>
        </button>
    </div>

    <!-- Login Card -->
    <div class="max-w-md w-full relative z-10 animate-plantGrow">
        <div class="bg-theme-card p-8 md:p-12 rounded-[2.5rem] border border-theme shadow-2xl backdrop-blur-md">
            <div class="text-center mb-10">
                <a href="index.html" class="inline-flex items-center gap-3 text-3xl font-playfair font-bold text-theme-main mb-6">
                    <i class="fas fa-leaf text-accentGreen"></i> Verdant Vault
                </a>
                <h1 class="text-theme-main text-xl font-medium tracking-widest uppercase mb-2">Welcome Back</h1>
                <p class="text-theme-main opacity-80 text-sm italic font-playfair">Resuming your botanical journey</p>
            </div>

            <form class="space-y-6">
                <!-- Select Login/Signup -->
                <div class="flex gap-2 p-1 bg-theme-main rounded-full border border-theme mb-8">
                    <a href="login.html" class="flex-1 py-3 bg-accentGreen text-white rounded-full font-bold text-sm text-center transition-all shadow-md">Login</a>
                    <a href="signup.html" class="flex-1 py-3 text-theme-main rounded-full font-bold text-sm text-center hover:bg-black/5 dark:hover:bg-white/5 transition-all">Signup</a>
                </div>

                <div class="space-y-4">
                    <div class="relative group">
                        <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-theme-main opacity-40 group-focus-within:text-accentGreen"></i>
                        <input type="email" placeholder="Collector Email" class="w-full py-4 pl-14 pr-6 bg-theme-main border border-theme rounded-2xl text-theme-main outline-none focus:border-accentGreen transition-all placeholder:text-theme-main placeholder:opacity-50">
                    </div>
                    
                    <div class="relative group">
                        <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-theme-main opacity-40 group-focus-within:text-accentGreen"></i>
                        <input type="password" id="password" placeholder="Vault Password" class="w-full py-4 pl-14 pr-6 bg-theme-main border border-theme rounded-2xl text-theme-main outline-none focus:border-accentGreen transition-all placeholder:text-theme-main placeholder:opacity-50">
                        <button type="button" onclick="togglePassword('password', this)" class="absolute right-5 top-1/2 -translate-y-1/2 text-theme-main opacity-40 hover:opacity-100 transition-opacity">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex justify-between items-center text-xs text-theme-main opacity-60 px-2 font-bold uppercase tracking-tighter">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="accent-accentGreen w-4 h-4">
                        <span class="group-hover:text-accentGreen transition-all">Remember Session</span>
                    </label>
                    <a href="#" class="hover:text-accentGreen transition-all">Forgotten Key?</a>
                </div>

                <button type="submit" class="w-full bg-[#3FA36C] text-white py-4 rounded-2xl font-bold tracking-widest text-sm hover:translate-y-[-2px] transition-all shadow-lg shadow-accentGreen/20 uppercase">
                    Enter the Greenhouse
                </button>

                <div class="relative flex items-center justify-center my-10">
                    <div class="h-px bg-theme-main w-full absolute border-t border-theme"></div>
                    <span class="relative px-4 bg-theme-card text-theme-main opacity-20 text-[10px] uppercase tracking-widest font-bold">Or Connect Via</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button type="button" class="flex items-center justify-center gap-3 py-3 px-4 border border-theme rounded-xl text-theme-main hover:bg-white hover:text-black hover:border-transparent hover:shadow-xl transition-all text-xs font-bold uppercase tracking-widest active:scale-95">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="Google">
                        Google
                    </button>
                    <button type="button" class="flex items-center justify-center gap-3 py-3 px-4 border border-theme rounded-xl text-theme-main hover:bg-[#1877F2] hover:text-white hover:border-transparent hover:shadow-xl transition-all text-xs font-bold uppercase tracking-widest active:scale-95">
                        <i class="fab fa-facebook text-[#1877F2] group-hover:text-white text-lg"></i>
                        Facebook
                    </button>
                </div>
            </form>
        </div>
        

    </div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
